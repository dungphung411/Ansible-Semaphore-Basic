---
- name: Test SSH No Python No Jinja
  hosts: all
  gather_facts: no

  tasks:
    - name: SSH connect test
      raw: "echo '{{ inventory_hostname }} SSH OK'"
      register: ssh_ok
      ignore_errors: yes

    - name: Hostname
      raw: hostname
      register: hostname
      ignore_errors: yes

    - name: Uptime
      raw: uptime -p
      register: uptime
      ignore_errors: yes

    - name: IP addr
      raw: "hostname -I | cut -d' ' -f1 || ip route get 1 | awk '{print $7}'"
      register: ipaddr
      ignore_errors: yes

    - name: CPU cores
      raw: nproc 2>/dev/null || echo "?"
      register: cpu
      ignore_errors: yes

    - name: Memory
      raw: 'free -m | grep Mem | awk ''{print $2"M total"}'''
      register: memory
      ignore_errors: yes

    - name: RESULT
      debug:
        msg: "{{ ssh_ok.stdout }} | {{ hostname.stdout }} | {{ uptime.stdout }} | IP:{{ ipaddr.stdout }} | CPU:{{ cpu.stdout }} | MEM:{{ memory.stdout | default('N/A') }}"
      when: ssh_ok is succeeded
