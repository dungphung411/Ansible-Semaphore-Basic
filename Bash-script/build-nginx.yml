---
- name: Build Nginx Package
  hosts: localhost
  tasks:
    - name: Install deps
      apt:
        name:
          - nginx-extras
          - fakeroot
        update_cache: yes

    - name: Copy custom config
      template:
        src: nginx.conf.j2
        dest: /tmp/nginx-build/nginx.conf

    - name: Build deb package
      shell: |
        cd /tmp/nginx-build
        dpkg-deb --build nginx-custom_1.0_all.deb
      args:
        creates: /tmp/nginx-build/nginx-custom_1.0_all.deb

    - name: Archive artifact
      archive:
        path: /tmp/nginx-build/nginx-custom_1.0_all.deb
        dest: /tmp/nginx-custom.deb.gz

    - name: Success
      debug:
        msg: "Nginx build done: {{ playbook_dir }}/nginx-custom.deb.gz"
