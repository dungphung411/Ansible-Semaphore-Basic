---

# Mục tiêu: Cài PostgreSQL (dạng .deb), khởi tạo PGDATA nếu chưa init,
# cấu hình file, bật service và tạo admin user/database.

# 1) Chuẩn bị: chép nội dung role vào `/opt` để dùng cho bước cài gói sau.
- name: copy file 
  copy:
    src: ./
    dest: /opt

# 2) Cài python tooling để các tác vụ/ứng dụng phía sau có thể dùng được.
- name: install python3-pip
  shell: "{{ item }}"
  with_items:
    - apt -qq install -y python3-pip
    - pip3 install psycopg2-binary --break-system-packages


# 3) Kiểm tra trạng thái init của PostgreSQL:
# - Nếu `postmaster.opts` tồn tại => DB đã được khởi tạo, skip các bước init/cài đặt.
- name: Check if PostgreSQL database is initialized.
  stat:
    path: "{{ psql_data_dir }}/postmaster.opts"
  register: p

# (Lưu ý) Task này đang bị lặp lại y hệt task phía trên.
# Về logic, kết quả `p.stat.exists` là như nhau nên task sau về bản chất chỉ là kiểm tra lại.
- name: Check if PostgreSQL database is initialized.
  stat:
    path: "{{ psql_data_dir }}/postmaster.opts"
  register: p

# 4) Cài PostgreSQL từ các file `.deb` trong `/opt/psql_{{ psql_version }}`
# chỉ khi DB chưa được init (`p.stat.exists == False`).
- name: Install postgresql as default
  shell: |
    cd /opt/psql_{{ psql_version }}
    DEBIAN_FRONTEND=noninteractive apt install --allow-downgrades -y ./*.deb
  retries: 5
  delay: 10
  register: result
  until: result.rc == 0
  when:
    - p.stat.exists == False

# 5) Chờ một khoảng ngắn rồi tiếp tục play (đảm bảo hệ thống ổn định sau install).
- name: Sleep for 5 seconds and continue with play
  wait_for:
    timeout: 5
  when:
    - p.stat.exists == False

# 6) Restart service PostgreSQL sau khi cài xong (chỉ chạy khi chưa init).
- name: restart postgresql after install
  service:
    name: postgresql
    enabled: no
    state: restarted
  when:
    - p.stat.exists == False

# 7) Tắt service PostgreSQL trước khi tự init PGDATA (chỉ chạy khi chưa init).
- name: Stop postgresql service
  service:
    name: postgresql
    enabled: no
    state: stopped
  when:
    - p.stat.exists == False
  # 1. Tạo user postgres (root)
- name: Create postgres system user
  user:
    name: postgres
    system: true
    shell: /bin/bash
    home: /var/lib/postgresql
    create_home: false
  become: true

# 8) Tạo thư mục dữ liệu (PGDATA) cho PostgreSQL với owner/group/mode phù hợp.
- name: Create postgresql data directory
  file:
    path: "{{ item }}"
    state: directory
    group: postgres
    owner: postgres
    mode: 0750
  with_items:
         - "{{ psql_data_dir }}"
  when:
    - p.stat.exists == False

# 9) Thêm public key vào `authorized_keys` của user `postgres`.
- name: Deploy SSH authorized_key
  authorized_key:
    user: postgres
    key: "{{ lookup('file', 'files/ssh_key/id_rsa.pub') }}"

# 10) Copy private key vào thư mục `.ssh` và đặt quyền chỉ cho `postgres`.
- name: Copy ssh keys
  copy:
    src: files/ssh_key/id_rsa
    dest: ~postgres/.ssh/id_rsa
    owner: postgres
    group: postgres
    mode: 0400


- name: Install acl for become_user
  apt:
    name: acl
    state: present
  become: true

# 11) Init database bằng `pg_ctl init` dưới user `postgres`, với biến môi trường PGDATA.
- name: Initialize database
  shell: "{{ item }}"
  become: true
  become_user: postgres
  with_items:
    - "{{ psql_bin_dir }}/pg_ctl init"
  args:
    executable: /bin/bash
  environment:
    PGDATA: "{{ psql_data_dir }}"
  when:
    - p.stat.exists == False

# # 12) Render/copy các file cấu hình từ template `pg_config/`:
# # - Với file `.j2` thì `template` sẽ render,
# # - file khác được lấy theo cấu trúc `with_filetree`.
# - name: Copy pg_config file
#   template:
#     src: "{{ item.src }}"
#     dest: "{{ psql_conf_dir }}/{{ item.path | regex_replace('\\.j2$', '') }}"
#     force: yes
#     owner: postgres
#     group: postgres
#     mode: 0644
#   with_filetree: '{{ role_path }}/templates/pg_config/'
#   when: item.state == 'file'

# # 13) Cập nhật unit file systemd cho PostgreSQL.
# - name: copy postgresql.service
#   template:
#     src: postgresql.service
#     dest: /lib/systemd/system/postgresql.service

# 14) Reload systemd để unit file mới được nhận.
- name: daemon reload service
  service:
    name: postgresql
    daemon_reload: yes

- name: Start PostgreSQL 18 main cluster
  systemd:
    name: postgresql  # ← Tên đúng cluster!
    state: started
    enabled: yes
  become: true


  # 16) Verify running
- name: Verify cluster status
  shell: pg_lsclusters | grep online
  register: pg_status
  changed_when: false

- name: Show status
  debug:
    var: pg_status.stdout

# 16) Đợi PostgreSQL mở port để các bước phía sau có thể kết nối.
- wait_for:
    host: "{{ ansible_host }}"
    port: "{{ psql_port }}"
    state: started

# 17) Thêm đường dẫn thư mục bin PostgreSQL vào `.profile` của user `postgres`
# (để `psql/pg_ctl` được tìm thấy khi đăng nhập).
- name: Adding the path in the bashrc files
  become_user: postgres
  lineinfile: 
    dest: ~postgres/.profile
    create: yes
    line: 'export PATH=$PATH:{{ psql_bin_dir }}' 
    insertafter: 'EOF' 
    state: present

# 18) Nguồn lại `.profile` trong phạm vi của lệnh shell hiện tại (không kéo dài ra ngoài task).
- name: Source Profile
  become_user: postgres
  shell: source ~postgres/.profile
  args:
    executable: /bin/bash

# 19) Tạo role “admin” (user PostgreSQL) với mật khẩu và quyền theo biến truyền vào.
- name: Create admin user
  become_user: postgres
  postgresql_user:
    port: "{{ psql_port }}"
    state: present
    name: "{{ psql_administrator_username }}"
    encrypted: yes
    password: "{{ psql_administrator_password }}"
    role_attr_flags: "{{ psql_administrator_role }}"

# 20) Tạo database dành cho admin (dùng template `template1`).
- name: Create administrator database
  become_user: postgres
  postgresql_db:
    port: "{{ psql_port }}"
    state: present
    name: "{{ psql_administrator_dbname }}"
    template: "template1"
    owner: "{{ psql_administrator_username }}"
